components:
  schemas:
    Account:
      type: object
      properties:
        account_number:
          type: string
          readOnly: true
        kyc:
          $ref: '#/components/schemas/KYC'
        user:
          $ref: '#/components/schemas/CustomUser'
        account_balance:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        account_minimum_shares_balance:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        created:
          type: string
          format: date-time
          readOnly: true
        is_active:
          type: boolean
        is_suspended:
          type: boolean
        is_full_member:
          type: boolean
        last_modified:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        recommended_by:
          type: string
          format: uuid
          nullable: true
      required:
      - account_number
      - created
      - last_modified
    BlankEnum:
      enum:
      - ''
    CustomRegister:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
          minLength: 1
        email:
          type: string
          format: email
        password1:
          type: string
          writeOnly: true
        password2:
          type: string
          writeOnly: true
        role:
          $ref: '#/components/schemas/RoleEnum'
      required:
      - email
      - password1
      - password2
      - role
    CustomTokenRefresh:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
          readOnly: true
      required:
      - access
      - refresh
    CustomUser:
      type: object
      description: Serializer for CustomUser model with password hidden and group
        names included.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        group_names:
          type: array
          items:
            type: string
          readOnly: true
        password:
          type: string
          readOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        date_joined:
          type: string
          format: date-time
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        user_permissions:
          type: array
          items:
            type: integer
          description: Specific permissions for this user.
      required:
      - email
      - group_names
      - id
      - password
      - username
    EmploymentStatusEnum:
      enum:
      - unemployed
      - self_employed
      - employed
      - student
      - retired
      - other
      type: string
      description: |-
        * `unemployed` - Unemployed
        * `self_employed` - Self Employed
        * `employed` - Employed
        * `student` - Student
        * `retired` - Retired
        * `other` - Other
    GenderEnum:
      enum:
      - male
      - female
      - other
      type: string
      description: |-
        * `male` - Male
        * `female` - Female
        * `other` - Other
    Group:
      type: object
      description: Serializer for Group model with permissions.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        permissions:
          type: array
          items:
            type: integer
      required:
      - id
      - name
      - permissions
    IdentityTypeEnum:
      enum:
      - national_id_card
      - drivers_licence
      - international_passport
      type: string
      description: |-
        * `national_id_card` - National ID Card
        * `drivers_licence` - Drives Licence
        * `international_passport` - International Passport
    JWT:
      type: object
      description: Serializer for JWT authentication.
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: '#/components/schemas/UserDetails'
      required:
      - access
      - refresh
      - user
    KYC:
      type: object
      properties:
        membership_number:
          type: string
          readOnly: true
        next_of_kin:
          type: array
          items:
            $ref: '#/components/schemas/NextOfKin'
        full_name:
          type: string
          maxLength: 1000
        marital_status:
          $ref: '#/components/schemas/MaritalStatusEnum'
        gender:
          $ref: '#/components/schemas/GenderEnum'
        identity_type:
          $ref: '#/components/schemas/IdentityTypeEnum'
        id_number:
          type: string
          maxLength: 10
        identity_image:
          type: string
          format: uri
        date_of_birth:
          type: string
          format: date-time
        signature:
          type: string
          format: uri
          nullable: true
        kra_pin:
          type: string
          maxLength: 15
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        country:
          type: string
          nullable: true
          maxLength: 100
        county:
          type: string
          nullable: true
          maxLength: 100
        town:
          type: string
          nullable: true
          maxLength: 100
        contact_number:
          type: string
          maxLength: 128
        kyc_submitted:
          type: boolean
        kyc_confirmed:
          type: boolean
        kyc_tier:
          $ref: '#/components/schemas/KycTierEnum'
        verification_status:
          $ref: '#/components/schemas/VerificationStatusEnum'
        verified_at:
          type: string
          format: date-time
          nullable: true
        rejected_reason:
          type: string
          nullable: true
        identity_image_back:
          type: string
          format: uri
          nullable: true
        selfie_image:
          type: string
          format: uri
          nullable: true
        provider_name:
          type: string
          nullable: true
          maxLength: 80
        provider_reference:
          type: string
          nullable: true
          maxLength: 120
        risk_score:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_pep:
          type: boolean
        is_sanctioned:
          type: boolean
        employment_status:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/EmploymentStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        user:
          type: string
          format: uuid
      required:
      - contact_number
      - created_at
      - date_of_birth
      - full_name
      - gender
      - id_number
      - identity_type
      - kra_pin
      - marital_status
      - membership_number
      - updated_at
      - user
    KycTierEnum:
      enum:
      - tier_0
      - tier_1
      - tier_2
      - tier_3
      type: string
      description: |-
        * `tier_0` - Tier 0 - Unverified
        * `tier_1` - Tier 1 - Basic
        * `tier_2` - Tier 2 - Document Verified
        * `tier_3` - Tier 3 - Enhanced Due Diligence
    Login:
