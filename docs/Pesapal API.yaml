      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextOfKin'
          description: ''
  /api/v1/accounts/api/next-of-kins/{id}/:
    get:
      operationId: v1_accounts_api_next_of_kins_retrieve
