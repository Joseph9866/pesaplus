openapi: 3.0.3
info:
  title: Pesapal API
  version: 1.0.0
  description: Versioned API for accounts, savings, loans, investments, and payments.
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - tokenAuth: []
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/accounts/api/accounts/:
    get:
      operationId: v1_accounts_api_accounts_list
      parameters:
      - in: query
        name: account_number
        schema:
          type: string
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_full_member
        schema:
          type: boolean
      - in: query
        name: is_suspended
        schema:
          type: boolean
      - in: query
        name: max_balance
        schema:
          type: integer
      - in: query
        name: min_balance
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user
        schema:
          type: string
      tags:
      - v1
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAccountList'
          description: ''
    post:
      operationId: v1_accounts_api_accounts_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Account'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Account'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: ''
  /api/v1/accounts/api/accounts/{account_number}/:
    get:
      operationId: v1_accounts_api_accounts_retrieve
      parameters:
      - in: path
        name: account_number
        schema:
          type: string
        description: A unique value identifying this Customer_Account.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: ''
    put:
      operationId: v1_accounts_api_accounts_update
      parameters:
      - in: path
        name: account_number
        schema:
          type: string
        description: A unique value identifying this Customer_Account.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Account'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Account'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: ''
    patch:
      operationId: v1_accounts_api_accounts_partial_update
      parameters:
      - in: path
        name: account_number
        schema:
          type: string
        description: A unique value identifying this Customer_Account.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAccount'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAccount'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAccount'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: ''
    delete:
      operationId: v1_accounts_api_accounts_destroy
      parameters:
      - in: path
        name: account_number
        schema:
          type: string
        description: A unique value identifying this Customer_Account.
        required: true
      tags:
      - v1
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/accounts/api/kyc/:
    get:
      operationId: v1_accounts_api_kyc_list
      parameters:
      - in: query
        name: country
        schema:
          type: string
      - in: query
        name: county
        schema:
          type: string
      - in: query
        name: gender
        schema:
          type: string
          enum:
          - female
          - male
          - other
        description: |-
          * `male` - Male
          * `female` - Female
          * `other` - Other
      - in: query
        name: id_number
        schema:
          type: string
      - in: query
        name: kra_pin
        schema:
          type: string
      - in: query
        name: kyc_confirmed
        schema:
          type: boolean
      - in: query
        name: kyc_submitted
        schema:
          type: boolean
      - in: query
        name: marital_status
        schema:
          type: string
          enum:
          - married
          - other
          - single
        description: |-
          * `married` - Married
          * `single` - Single
          * `other` - Other
      - in: query
        name: membership_number
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user
        schema:
          type: string
      tags:
      - v1
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedKYCList'
          description: ''
    post:
      operationId: v1_accounts_api_kyc_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KYC'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/KYC'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KYC'
        required: true
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KYC'
          description: ''
  /api/v1/accounts/api/kyc/{membership_number}/:
    get:
      operationId: v1_accounts_api_kyc_retrieve
      parameters:
