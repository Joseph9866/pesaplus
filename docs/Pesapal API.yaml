          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedKYC'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedKYC'
      security:
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KYC'
          description: ''
    delete:
      operationId: v1_accounts_api_kyc_destroy
